<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Glow filter for that epic RPG look -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.7" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="bladeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d5dce6" />
    </linearGradient>
    <linearGradient id="bladeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90a4ae" />
      <stop offset="100%" stop-color="#4f6a75" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d080" />
      <stop offset="50%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#8a6d25" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7bde2" />
      <stop offset="100%" stop-color="#9b59b6" />
    </linearGradient>
  </defs>

  <!-- Group rotated 45deg to fit the square bounds perfectly -->
  <g transform="rotate(45 32 32)">
    <g filter="url(#glow)">
      <!-- Blade -->
      <!-- Left side of blade -->
      <polygon points="32,4 27,14 29,42 32,42" fill="url(#bladeLeft)" />
      <!-- Right side of blade -->
      <polygon points="32,4 37,14 35,42 32,42" fill="url(#bladeRight)" />
      <!-- Fuller/Center ridge line -->
      <line x1="32" y1="12" x2="32" y2="40" stroke="#1c2833" stroke-width="0.8" opacity="0.6" />
      
      <!-- Crossguard -->
      <!-- Guard base -->
      <path d="M 20,42 C 26,42 28,45 32,45 C 36,45 38,42 44,42 C 46,42 46,44 44,45 C 38,48 35,48 32,48 C 29,48 26,48 20,45 C 18,44 18,42 20,42 Z" fill="url(#goldGrad)" />
      <!-- Curved guard tips pointing up -->
      <path d="M 18,40 C 18,40 19,41 20,42 M 46,40 C 46,40 45,41 44,42" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
      
      <!-- Hilt / Grip -->
      <rect x="30.5" y="47" width="3" height="10" rx="1.5" fill="#2d1f18" />
      <!-- Ribbed wraps on hilt -->
      <line x1="30.5" y1="49" x2="33.5" y2="49" stroke="url(#goldGrad)" stroke-width="0.8" />
      <line x1="30.5" y1="51" x2="33.5" y2="51" stroke="url(#goldGrad)" stroke-width="0.8" />
      <line x1="30.5" y1="53" x2="33.5" y2="53" stroke="url(#goldGrad)" stroke-width="0.8" />
      <line x1="30.5" y1="55" x2="33.5" y2="55" stroke="url(#goldGrad)" stroke-width="0.8" />
      
      <!-- Pommel -->
      <circle cx="32" cy="58.5" r="2.5" fill="url(#goldGrad)" />
      
      <!-- Hilt Gem -->
      <polygon points="32,43.5 34,45.5 32,47.5 30,45.5" fill="url(#purpleGrad)" />
    </g>
  </g>
</svg>
